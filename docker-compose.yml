services:
  postgres:
    image: postgres:16-alpine
    container_name: transport-dispatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transport_dispatch}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transport_dispatch}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transport-dispatch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-transport_dispatch}?schema=public
    ports:
      - "${PORT:-3000}:3000"
    command: sh -c "npx prisma migrate deploy && node dist/main"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-transport_dispatch}?schema=public
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed"

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-transport_dispatch}?schema=public
    ports:
      - "5555:5555"
    command: sh -c "npx prisma studio --hostname 0.0.0.0 --port 5555"

volumes:
  postgres_data:
